<!DOCTYPE html>
<html lang="en">
<head>
    <script type ="importmap" >
    {
        "imports": {
        "three": "https://cdn.jsdelivr.net/npm/three@0.160.0/build/three.module.js",
        "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.160.0/examples/jsm/",
        "three/src/": "https://cdn.jsdelivr.net/npm/three@0.160.0/src/",
        "cannon-es": "https://cdn.jsdelivr.net/npm/cannon-es@0.20.0/dist/cannon-es.js",
        "socket.io-client": "https://cdn.socket.io/4.7.2/socket.io.esm.min.js"
    }
    }
    </script>
    <!-- <script type = "module" src = "https://cdn.socket.io/4.7.2/socket.io.min.js"></script> -->
</head>
<body>
    <div id = "login">
        <form>
            <label for="username">Username:</label>
            <input type = "text" id = "username" name = "username">
            <br>
            <label for = "room">Room:</label>
            <input type = "text" id = "room" name = "room">
            <button type = "submit">Login</button>
        </form>
    </div>
    <script> 
        document.getElementById("login").addEventListener("submit", (event) =>{
            event.preventDefault();
            const username = document.getElementById("username").value;
            const room = document.getElementById("room").value;
            if (username && room){
                localStorage.setItem("username", username);
                localStorage.setItem("room", room);
                
                document.getElementById("login").hidden = true;

                const script = document.createElement("script");
                script.type = "module";
                script.src = "https://cdn.jsdelivr.net/gh/NburtonII/CircuitCircuit@latest/src/index.js";
                document.body.appendChild(script);
            } else {
                alert("Please enter both username and room.");
            }
        });
    </script>
    <!-- <script type = "module" src = "/src/index.js"></script> -->
</body>
</html>
